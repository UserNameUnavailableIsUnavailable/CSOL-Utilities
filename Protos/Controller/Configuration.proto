syntax = "proto3";

package CSOL_Utilities.Protos.Controller;

service ConfigurationService {
  rpc Retrieve(RetrieveConfigurationRequest) returns (RetrieveConfigurationResponse);
  rpc Update(UpdateConfigurationRequest) returns (UpdateConfigurationResponse);
}

message RetrieveConfigurationRequest {
}

message RetrieveConfigurationResponse {
  bool ok = 1;
  string data = 2;
}

message UpdateConfigurationRequest {
  string data = 1;
}

message UpdateConfigurationResponse {
  bool ok = 1;
}
